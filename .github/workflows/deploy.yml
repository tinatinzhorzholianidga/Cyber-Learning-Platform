name: Deploy to GitHub Pages

# Publishes the Vite build to the `gh-pages` artifact branch and points
# GitHub Pages at it. (The actions/deploy-pages flow is blocked here by
# the auto-created github-pages environment's branch protection, which
# cannot be edited with the workflow token.)
on:
  push:
    branches:
      - main
      - claude/cyberhero-platform-setup-gd5ur7
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
      - name: Point Pages at the gh-pages branch
        # The Actions token is not allowed to edit Pages settings on this
        # repo (403 "Resource not accessible by integration"), so this can
        # only succeed after an admin loosens that — until then it warns
        # and the one-time manual step in the README applies.
        run: |
          code=$(curl -s -o /tmp/pages.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}')
          if [ "$code" = "204" ] || [ "$code" = "200" ]; then
            echo "Pages source set to gh-pages"
          else
            echo "PUT -> $code"; cat /tmp/pages.json || true
            echo "::warning::Pages source not switched (token lacks permission). One-time manual step: Settings → Pages → Source: Deploy from a branch → gh-pages / (root)."
          fi
