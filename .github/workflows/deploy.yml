name: Deploy to GitHub Pages

# Publishes the Vite build to the `gh-pages` artifact branch and points
# GitHub Pages at it. (The actions/deploy-pages flow is blocked here by
# the auto-created github-pages environment's branch protection, which
# cannot be edited with the workflow token.)
on:
  push:
    branches:
      - main
      - claude/cyberhero-platform-setup-gd5ur7
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
      - name: Point Pages at the gh-pages branch
        run: |
          api="https://api.github.com/repos/${{ github.repository }}/pages"
          auth=(-H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          body='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
          code=$(curl -s -o /tmp/put.json -w "%{http_code}" -X PUT "${auth[@]}" "$api" -d "$body")
          echo "PUT -> $code"; cat /tmp/put.json || true
          if [ "$code" = "204" ] || [ "$code" = "200" ]; then echo "Pages source set to gh-pages"; exit 0; fi
          echo "PUT failed — trying delete + recreate"
          code=$(curl -s -o /tmp/del.json -w "%{http_code}" -X DELETE "${auth[@]}" "$api")
          echo "DELETE -> $code"; cat /tmp/del.json || true
          code=$(curl -s -o /tmp/post.json -w "%{http_code}" -X POST "${auth[@]}" "$api" -d "$body")
          echo "POST -> $code"; cat /tmp/post.json || true
          if [ "$code" = "201" ]; then echo "Pages site recreated from gh-pages"; exit 0; fi
          echo "::warning::Could not switch Pages source automatically. One-time manual step: Settings → Pages → Source: Deploy from a branch → gh-pages."
