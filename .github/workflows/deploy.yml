name: Deploy to GitHub Pages

# The auto-created github-pages environment only accepts deployments
# from `main` (verified: it rejects both the stage branch and gh-pages,
# and its policy is not editable with the workflow token). So: pushes
# to the stage branch fast-forward `main` and dispatch this workflow
# there; the run on `main` deploys through the environment.
on:
  push:
    branches:
      - main
      - claude/cyberhero-platform-setup-gd5ur7
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # GITHUB_TOKEN pushes don't trigger workflows, so after syncing main
  # we dispatch this workflow there explicitly.
  sync-main:
    if: github.ref_name != 'main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git push origin HEAD:main
      - run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
