<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberHero · კიბერგმირი</title>
<style>
  :root{
    --bg1:#0f1226; --bg2:#1b1f4a; --accent:#5b8cff; --accent2:#8b5cff;
    --card:#ffffff; --ink:#1a1c2e; --muted:#5b607a; --ring:rgba(91,140,255,.35);
    --radius:20px; --kids:#ff8c42;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,'Noto Sans Georgian',sans-serif;
    color:#fff; min-height:100vh;
    background:radial-gradient(1200px 700px at 15% -10%,#2a2f6b 0%,transparent 55%),
               radial-gradient(1000px 700px at 100% 0%,#3a1f6b 0%,transparent 50%),
               linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
  }
  header{display:flex;align-items:center;justify-content:space-between;padding:20px clamp(16px,5vw,56px);}
  .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1.35rem;letter-spacing:.3px}
  .logo{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:1.4rem;
    background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 24px var(--ring);}
  .brand small{display:block;font-size:.72rem;font-weight:500;color:#b9c0e6;letter-spacing:.5px}
  .lang{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    border-radius:999px;padding:4px;gap:2px;backdrop-filter:blur(8px);}
  .lang button{border:0;background:transparent;color:#c9cff0;font-weight:700;cursor:pointer;
    padding:7px 16px;border-radius:999px;font-size:.9rem;transition:.2s;}
  .lang button.active{background:#fff;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.2)}
  main{max-width:1120px;margin:0 auto;padding:clamp(16px,4vw,40px) clamp(16px,5vw,56px) 60px}
  .hero{text-align:center;margin:clamp(10px,4vh,40px) 0 clamp(24px,5vh,46px)}
  .hero h1{font-size:clamp(2rem,5vw,3.3rem);line-height:1.08;font-weight:800;margin-bottom:14px}
  .hero h1 .grad{background:linear-gradient(120deg,#7ea6ff,#c39bff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:#c2c8ee;font-size:clamp(1rem,2vw,1.2rem);max-width:620px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
  .card{background:var(--card);color:var(--ink);border-radius:var(--radius);padding:26px 24px;
    cursor:pointer;position:relative;overflow:hidden;text-align:left;border:1px solid rgba(0,0,0,.04);
    box-shadow:0 12px 30px rgba(10,12,40,.28);transition:transform .18s ease,box-shadow .18s ease;}
  .card:hover{transform:translateY(-6px);box-shadow:0 22px 46px rgba(10,12,40,.4)}
  .card:before{content:"";position:absolute;inset:0 auto 0 0;width:6px;background:var(--c,#5b8cff)}
  .card .ic{font-size:2.5rem;line-height:1;margin-bottom:14px;display:block}
  .card .tag{display:inline-block;font-size:.74rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    color:var(--c,#5b8cff);background:color-mix(in srgb,var(--c,#5b8cff) 12%,white);
    padding:4px 10px;border-radius:999px;margin-bottom:10px}
  .card h3{font-size:1.28rem;margin-bottom:4px}
  .card .desc{color:#3c4160;font-size:.95rem;line-height:1.5}
  .card .go{margin-top:16px;display:inline-flex;align-items:center;gap:7px;font-weight:700;color:var(--c,#5b8cff)}
  footer{text-align:center;color:#9aa0cc;font-size:.85rem;padding:24px}
  .badge{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    padding:5px 12px;border-radius:999px;font-size:.78rem;color:#c9cff0;margin-bottom:18px}
  .detail{max-width:820px;margin:0 auto;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;
    padding:9px 16px;border-radius:999px;cursor:pointer;font-weight:700;display:inline-flex;gap:8px;align-items:center;margin-bottom:22px}
  .back:hover{background:rgba(255,255,255,.18)}
  .dhead{display:flex;align-items:center;gap:18px;margin-bottom:8px}
  .dhead .ic{font-size:3.2rem}
  .dhead h2{font-size:clamp(1.6rem,4vw,2.3rem)}
  .dhead .tag{font-size:.8rem;font-weight:700;color:#b9c0e6}
  .dintro{color:#cdd2f2;font-size:1.08rem;line-height:1.6;margin:14px 0 26px}
  .learn h4{font-size:1rem;text-transform:uppercase;letter-spacing:1px;color:#9aa0cc;margin-bottom:14px}
  .topics{display:grid;gap:12px}
  .topic{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-left:4px solid var(--c,#5b8cff);
    border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;font-size:1.02rem}
  .topic .n{width:28px;height:28px;flex:0 0 auto;border-radius:8px;background:var(--c,#5b8cff);color:#fff;
    display:grid;place-items:center;font-weight:800;font-size:.85rem}
  .soon{margin-top:26px;text-align:center;color:#aeb4dd;font-size:.95rem;
    background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.2);border-radius:14px;padding:18px}

  /* ---------- KIDS TIER ---------- */
  .kids{max-width:760px;margin:0 auto;animation:fade .25s ease;text-align:center}
  .fufu{display:flex;align-items:center;gap:16px;justify-content:center;margin:6px auto 22px;max-width:620px;text-align:left}
  .fufu-av{width:78px;height:78px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;font-size:2.6rem;
    background:radial-gradient(circle at 50% 35%,#ffd9b0,#ff9a4d);box-shadow:0 8px 22px rgba(255,140,66,.45);position:relative}
  .fufu-av:after{content:"";position:absolute;left:-6px;top:20px;width:22px;height:34px;border-radius:8px 8px 14px 14px;
    background:linear-gradient(#ff4d67,#c8102e);transform:rotate(-16deg);z-index:-1}
  .fufu-say{background:#fff;color:var(--ink);border-radius:16px;padding:14px 18px;font-size:1.08rem;font-weight:600;
    line-height:1.4;box-shadow:0 8px 24px rgba(0,0,0,.25);position:relative;flex:1}
  .fufu-say:before{content:"";position:absolute;left:-9px;top:26px;border:9px solid transparent;border-right-color:#fff}
  .kids h2{font-size:clamp(1.7rem,4vw,2.2rem);margin-bottom:6px}
  .kprog{color:#ffd9b0;font-weight:800;margin-bottom:22px;font-size:1.05rem}
  .mstops{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}
  .mstop{background:#fff;color:var(--ink);border-radius:20px;padding:22px 14px;cursor:pointer;position:relative;
    box-shadow:0 12px 26px rgba(10,12,40,.3);transition:transform .16s;border:3px solid transparent}
  .mstop:hover{transform:translateY(-5px) scale(1.02)}
  .mstop.done{border-color:#ffc24b}
  .mstop .memoji{font-size:2.6rem;display:block;margin-bottom:8px}
  .mstop .mname{font-weight:800;font-size:1rem;line-height:1.25}
  .mstop .mstar{position:absolute;top:8px;right:10px;font-size:1.3rem;opacity:.25}
  .mstop.done .mstar{opacity:1}
  .playcard{background:#fff;color:var(--ink);border-radius:24px;padding:clamp(20px,4vw,34px);max-width:560px;margin:0 auto;
    box-shadow:0 18px 40px rgba(10,12,40,.35)}
  .qtext{font-size:1.3rem;font-weight:800;margin:6px 0 20px;line-height:1.3}
  .bigbtn{border:0;cursor:pointer;font-family:inherit;font-weight:800;border-radius:16px;transition:transform .12s,filter .12s}
  .bigbtn:hover{transform:translateY(-2px);filter:brightness(1.05)}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .choice{background:#f3f5ff;border:2px solid #e3e8ff;color:var(--ink);padding:20px 14px;border-radius:16px;
    cursor:pointer;font-weight:800;font-size:1.02rem;font-family:inherit;transition:transform .12s;display:flex;
    flex-direction:column;gap:10px;align-items:center}
  .choice:hover{transform:translateY(-3px);border-color:var(--kids)}
  .choice .ce{font-size:2.2rem}
  .tablet{background:#0f1330;border:6px solid #2a2f5e;border-radius:22px;padding:26px 20px;position:relative;min-height:230px;
    display:grid;place-items:center}
  .popup{background:linear-gradient(135deg,#fff3c4,#ffd36b);color:#5a3d00;border-radius:16px;padding:22px 18px 18px;
    width:90%;max-width:360px;position:relative;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:pop .3s ease}
  @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .popup .pe{font-size:2.6rem}
  .popup .pt{font-weight:800;font-size:1.12rem;margin:6px 0 14px}
  .popup .claim{background:#ff4d67;color:#fff;padding:12px 22px;font-size:1.05rem}
  .popup .x{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:#fff;color:#333;
    border:0;cursor:pointer;font-size:1.2rem;font-weight:800;line-height:1;box-shadow:0 3px 8px rgba(0,0,0,.3)}
  .popup .x.hl{animation:pulse 1s infinite;box-shadow:0 0 0 4px rgba(62,207,142,.7)}
  @keyframes pulse{50%{transform:scale(1.15)}}
  .twobox{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .box{padding:22px 12px;border-radius:16px;cursor:pointer;font-weight:800;font-size:1.05rem;border:3px solid;
    font-family:inherit;transition:transform .12s;display:flex;flex-direction:column;gap:8px;align-items:center}
  .box:hover{transform:translateY(-3px)}
  .box.share{background:#e8fff3;border-color:#3ecf8e;color:#127a4e}
  .box.secret{background:#fff0e6;border-color:var(--kids);color:#b85c1a}
  .box .be{font-size:2rem}
  .item{font-size:1.4rem;font-weight:800;margin:4px 0 20px}
  .item .ie{font-size:3.4rem;display:block;margin-bottom:8px}
  .people{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px}
  .person{background:#f3f5ff;border:2px solid #e3e8ff;border-radius:16px;padding:16px 6px;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:.9rem;color:var(--ink);transition:transform .12s;display:flex;
    flex-direction:column;gap:6px;align-items:center}
  .person .pe2{font-size:2.2rem}
  .person:hover{transform:translateY(-3px)}
  .person.picked{background:#fff6e6;border-color:#ffc24b;box-shadow:0 0 0 3px rgba(255,194,75,.4)}
  .fbtn{margin-top:20px;background:var(--kids);color:#fff;padding:14px 30px;font-size:1.1rem}
  .cert{background:#fff;color:var(--ink);border-radius:20px;padding:34px 26px;max-width:520px;margin:22px auto 0;
    border:6px double #ffc24b;text-align:center}
  .cert h3{font-size:1.6rem;color:var(--kids);margin-bottom:6px}
  .cert .medal{font-size:3.4rem}
  .cert .line{border-bottom:2px solid #ccc;height:34px;margin:14px 30px 6px}
  .cert small{color:var(--muted)}

  /* ---------- CYBER CADETS ---------- */
  .coach-av{background:radial-gradient(circle at 50% 35%,#bcd3ff,#5b8cff)!important;box-shadow:0 8px 22px rgba(91,140,255,.45)!important}
  .coach-av:after{background:linear-gradient(#5b8cff,#2a5bd7)!important}
  .optlist{display:grid;gap:12px}
  .optbtn{background:#f3f5ff;border:2px solid #e3e8ff;color:var(--ink);padding:16px 18px;border-radius:14px;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:1.02rem;text-align:left;transition:transform .12s}
  .optbtn:hover{transform:translateX(4px);border-color:#5b8cff}
  .box.danger{background:#ffe9ec;border-color:#e05780;color:#b3255a}
  .box.safe{background:#e8fff3;border-color:#3ecf8e;color:#127a4e}
  .msgcard{background:#f7f8ff;border:1px solid #e3e8ff;border-radius:14px;padding:16px 18px;text-align:left;margin-bottom:18px}
  .msgcard .mfrom{font-weight:800;margin-bottom:6px;color:var(--ink)}
  .msgcard .mbody{color:#3c4160;line-height:1.5}
  .setrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #eef0fa;text-align:left}
  .setrow:last-of-type{border-bottom:0}
  .setlabel{font-weight:700;color:var(--ink);font-size:.98rem;flex:1}
  .seg{display:flex;gap:6px;flex:0 0 auto}
  .segbtn{border:2px solid #e3e8ff;background:#f3f5ff;color:#5b607a;padding:9px 12px;border-radius:10px;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:.85rem;transition:.12s}
  .segbtn.good{background:#e8fff3;border-color:#3ecf8e;color:#127a4e}
  .segbtn.bad{background:#ffe9ec;border-color:#e05780;color:#b3255a}
  .pts{color:#bcd3ff;font-weight:800;font-size:1.05rem;margin-bottom:22px}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">🛡️</span>
    <div>CyberHero<small id="brand-tag">Become a cyber hero</small></div>
  </div>
  <div class="lang" role="group" aria-label="language">
    <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
    <button id="btn-ka" onclick="setLang('ka')">ქარ</button>
  </div>
</header>
<main id="app"></main>
<footer id="foot"></footer>

<script>
/* ---------------- GLOBAL UI STRINGS ---------------- */

  brandTag:{en:"Become a cyber hero", ka:"გახდი კიბერგმირი"},

  soon:{en:"Lessons & games for this group are coming soon. This is an early prototype!",
        ka:"ამ ჯგუფის გაკვეთილები და თამაშები მალე დაემატება. ეს ადრეული პროტოტიპია!"},
  proto:{en:"Prototype", ka:"პროტოტიპი"},
  footer:{en:"CyberHero · bilingual cyber-hygiene learning · prototype v0.2",
          ka:"კიბერგმირი · ორენოვანი კიბერჰიგიენის სწავლება · პროტოტიპი v0.2"},
};

const TIERS = [
  { id:"kids", color:"#ff8c42", ic:"🐣", playable:true,
    tag:{en:"Grades 1–3 · ages 6–9", ka:"1–3 კლასი · 6–9 წელი"},
    name:{en:"Little Heroes", ka:"პატარა გმირები"},
    desc:{en:"Fun games that teach what's safe to click, share, and say online.",
          ka:"სახალისო თამაშები იმის შესახებ, თუ რა არის უსაფრთხო ინტერნეტში."}},
  { id:"cadets", color:"#3ecf8e", ic:"🎮",

    desc:{en:"Your first accounts and phone — passwords, privacy, and being kind online.",
          ka:"შენი პირველი ანგარიშები და ტელეფონი — პაროლები, პრივატულობა და კეთილგანწყობა."},
    intro:{en:"Real scenarios from social apps and games, with points and challenges to keep it fun.",
           ka:"რეალური სიტუაციები სოც-აპებიდან და თამაშებიდან, ქულებითა და გამოწვევებით."},
    topics:{en:["Make strong passwords","Set your profiles to private","Don't overshare online","Beware of strangers in game chats","Recognize and report bullying","Spot basic phishing tricks"],
            ka:["შექმენი ძლიერი პაროლები","გახადე პროფილები დახურული","ნუ გააზიარებ ზედმეტს","ფრთხილად უცნობებთან თამაშის ჩატებში","ამოიცანი და დააფიქსირე ბულინგი","ამოიცანი ფიშინგის მარტივი ხრიკები"]}},

  { id:"campus", color:"#8b5cff", ic:"🎓",
    tag:{en:"University · ages 18–21", ka:"სტუდენტები · 18–21 წელი"},
    name:{en:"Campus Cyber", ka:"კამპუს კიბერი"},
    desc:{en:"The full toolkit: passwords, 2FA, scams, deepfakes, and data privacy.",

    intro:{en:"The complete curriculum — every core topic, at full depth, for independent adults.",
           ka:"სრული კურსი — ყველა ძირითადი თემა, სრული სიღრმით, დამოუკიდებელი ადამიანებისთვის."},
    topics:{en:["Use a password manager","Enable 2FA on every account","Public Wi-Fi risks","Job & scholarship scams","Deepfakes and misinformation","Build a clean professional presence","Protect your personal data"],
            ka:["გამოიყენე პაროლების მენეჯერი","ჩართე 2FA ყველა ანგარიშზე","საჯარო Wi-Fi-ის რისკები","სამსახურისა და სტიპენდიის თაღლითობა","დიპფეიქები და დეზინფორმაცია","ააგე პროფესიული ონლაინ იმიჯი","დაიცავი პერსონალური მონაცემები"]}},
  { id:"work", color:"#00b5d8", ic:"💼",
    tag:{en:"Working adults", ka:"მომუშავე ადამიანები"},
    name:{en:"Cyber@Work", ka:"კიბერი სამსახურში"},
    desc:{en:"Practical security for work, money, and protecting your family.",

          {t:{en:"Post something mean back", ka:"საპასუხოდ ბოროტი დაწერო"}, correct:false},
          {t:{en:"Screenshot it, block them, tell a trusted adult", ka:"გადაუღე სქრინი, დაბლოკე, უთხარი უფროსს"}, correct:true},
          {t:{en:"Say nothing and tell no one", ka:"არაფერი თქვა და არავის უთხრა"}, correct:false}],
        ok:{en:"Yes! Save proof, block, and get help — you don't handle it alone.", ka:"დიახ! შეინახე მტკიცებულება, დაბლოკე და მიიღე დახმარება — მარტო ნუ გაუმკლავდები."},
        bad:{en:"Fighting back or hiding it makes it worse. Save proof and tell someone.", ka:"საპასუხო შეტევა ან დამალვა ამძაფრებს. შეინახე მტკიცებულება და უთხარი ვინმეს."}},
      { q:{en:"You see a classmate bullied in a group chat.", ka:"ხედავ, თანაკლასელს ბულინგს უწევენ ჯგუფურ ჩატში."},
        options:[
          {t:{en:"Join in so you're not next", ka:"შეუერთდე, რომ შენ არ მოგადგნენ"}, correct:false},
          {t:{en:"Support them and report it", ka:"დაუდექი მხარში და დააფიქსირე"}, correct:true},
          {t:{en:"Do nothing", ka:"არაფერი გააკეთო"}, correct:false}],
        ok:{en:"That's a real hero — support the person and report the bullying.", ka:"ეს ნამდვილი გმირობაა — დაუდექი მხარში და დააფიქსირე ბულინგი."},
        bad:{en:"Silence or joining in helps the bully. Stand up and report.", ka:"დუმილი ან შეერთება ბულერს ეხმარება. დაუდექი მხარში და დააფიქსირე."}},
      { q:{en:"A stranger keeps sending you scary messages.", ka:"უცნობი განუწყვეტლივ საშიშ შეტყობინებებს გიგზავნის."},
        options:[
          {t:{en:"Reply so they stop", ka:"უპასუხე, რომ შეწყვიტოს"}, correct:false},
          {t:{en:"Block them and tell a trusted adult", ka:"დაბლოკე და უთხარი სანდო უფროსს"}, correct:true},
          {t:{en:"Send info so they leave you alone", ka:"გაუგზავნე ინფო, რომ თავი დაგანებოს"}, correct:false}],
        ok:{en:"Right! Don't engage — block and tell someone you trust.", ka:"სწორია! ნუ ჩაერთვები — დაბლოკე და უთხარი სანდო უფროსს."},
        bad:{en:"Never reply or share info. Block and tell an adult.", ka:"არასდროს უპასუხო ან გაუზიარო ინფო. დაბლოკე და უთხარი უფროსს."}}]},
];

/* ---------------- STATE ---------------- */
let lang = "en";
let view = "home";
let _hMi=null,_hStep=0,_hFinish=false;
(function(){const h=(location.hash||"").replace("#","").split("/");
  if(h[0]==="en"||h[0]==="ka")lang=h[0];
  if(h[1])view=h[1];
  if(h[2]==="finish")_hFinish=true;
  else{ if(h[2]!==undefined&&h[2]!=="")_hMi=parseInt(h[2]); if(h[3]!==undefined&&h[3]!=="")_hStep=parseInt(h[3]); }
})();

let kids={screen:"map",mi:0,step:0,done:{},feedback:null,picked:{}};
if(view==="kids"){
  if(_hFinish){ kids={screen:"finish",mi:0,step:0,done:{0:1,1:1,2:1,3:1},feedback:null,picked:{}}; }
  else if(_hMi!==null){ kids={screen:"play",mi:_hMi,step:_hStep,done:{},feedback:null,picked:{}}; }
}
let cadets={screen:"map",mi:0,step:0,done:{},feedback:null,points:0,toggles:{}};
if(view==="cadets"){
  if(_hFinish){ cadets={screen:"finish",mi:0,step:0,done:{0:1,1:1,2:1,3:1,4:1},feedback:null,points:150,toggles:{}}; }
  else if(_hMi!==null){ cadets={screen:"play",mi:_hMi,step:_hStep,done:{},feedback:null,points:0,toggles:{}}; }
}

const app = document.getElementById("app");
const arrow = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
function tx(o){return o[lang];}

function syncLangButtons(){
  document.getElementById("btn-en").classList.toggle("active", lang==="en");
  document.getElementById("btn-ka").classList.toggle("active", lang==="ka");
  document.getElementById("brand-tag").textContent = T.brandTag[lang];
  document.documentElement.lang = lang;
}
function setLang(l){ lang=l; syncLangButtons(); render(); }
function goTier(id){
  view=id;
  if(id==="kids") kids={screen:"map",mi:0,step:0,done:{},feedback:null,picked:{}};
  if(id==="cadets") cadets={screen:"map",mi:0,step:0,done:{},feedback:null,points:0,toggles:{}};
  render(); window.scrollTo({top:0,behavior:"smooth"});
}
function home(){ view="home"; render(); window.scrollTo({top:0}); }

/* ---------------- RENDER ---------------- */
function render(){
  document.getElementById("foot").textContent = T.footer[lang];
  if(view==="home") return renderHome();
  if(view==="kids") return renderKids();
  if(view==="cadets") return renderCadets();
  return renderDetail();
}

function renderHome(){
  const [l1,l2]=T.heroTitle[lang];
  app.innerHTML = `
    <section class="hero">
      <span class="badge">✦ ${T.proto[lang]}</span>
      <h1>${l1}<br><span class="grad">${l2}</span></h1>
      <p>${T.heroSub[lang]}</p>
    </section>
    <h2 style="text-align:center;font-size:1.15rem;letter-spacing:1px;text-transform:uppercase;color:#9aa0cc;margin-bottom:22px">${T.pick[lang]}</h2>
    <div class="grid">
      ${TIERS.map(t=>`
        <div class="card" style="--c:${t.color}" onclick="goTier('${t.id}')" role="button" tabindex="0">
          <span class="ic">${t.ic}</span>
          <span class="tag">${tx(t.tag)}</span>
          <h3>${tx(t.name)}</h3>
          <div class="desc">${tx(t.desc)}</div>
          <span class="go">${T.go[lang]} ${arrow}</span>
        </div>`).join("")}
    </div>`;
}

function renderDetail(){
  const t=TIERS.find(x=>x.id===view);
  app.innerHTML = `
    <div class="detail">
      <button class="back" onclick="home()">← ${T.back[lang]}</button>
      <div class="dhead">
        <span class="ic">${t.ic}</span>
        <div><div class="tag">${tx(t.tag)}</div><h2 style="color:${t.color}">${tx(t.name)}</h2></div>
      </div>
      <p class="dintro">${tx(t.intro)}</p>
      <div class="learn" style="--c:${t.color}">
        <h4>${T.learn[lang]}</h4>
        <div class="topics">
          ${tx(t.topics).map((tp,i)=>`<div class="topic"><span class="n">${i+1}</span><span>${tp}</span></div>`).join("")}
        </div>
      </div>
      <div class="soon">🚧 ${T.soon[lang]}</div>
    </div>`;
}

/* ---------------- KIDS APP ---------------- */
function fufu(msg){
  return `<div class="fufu"><div class="fufu-av">🐶</div><div class="fufu-say">${msg}</div></div>`;
}
function stepsOf(m){
  if(m.type==="popups")return m.popups.length;
  if(m.type==="sort")return m.items.length;
  if(m.type==="choose")return m.scenarios.length;
  if(m.type==="trust")return 2;
  return 1;
}
function kidsStart(i){ kids.mi=i; kids.step=0; kids.feedback=null; kids.picked={}; kids.screen="play"; render(); window.scrollTo({top:0}); }
function kidsResult(ok){ kids.feedback={ok}; render(); }
function kidsRetry(){ kids.feedback=null; render(); }
function kidsNext(){
  kids.feedback=null;
  const m=MISSIONS[kids.mi];
  kids.step++;
  if(kids.step>=stepsOf(m)){
    kids.done[kids.mi]=1; kids.picked={};
    if(Object.keys(kids.done).length>=MISSIONS.length){ kids.screen="finish"; }
    else { kids.screen="map"; }
  }
  render(); window.scrollTo({top:0});
}
function kidsPick(i){
  kids.picked[i]=1;
  const m=MISSIONS[kids.mi];
  if(Object.keys(kids.picked).length>=m.adults.length){ kids.feedback={ok:true,msg:tx(m.done2)}; }
  render();
}

function renderKids(){
  if(kids.screen==="finish") return renderKidsFinish();
  if(kids.screen==="play") return renderKidsPlay();
  // MAP
  const stars=Object.keys(kids.done).length;
  app.innerHTML = `
    <div class="kids">
      <button class="back" onclick="home()">← ${T.back[lang]}</button>
      <h2 style="color:var(--kids)">🐶 ${tx(KUI.title)}</h2>
      ${fufu(tx(KUI.hi))}
      <div class="kprog">⭐ ${tx(KUI.prog)}: ${stars} / ${MISSIONS.length}</div>
      <div class="mstops">
        ${MISSIONS.map((m,i)=>`
          <div class="mstop ${kids.done[i]?'done':''}" onclick="kidsStart(${i})">
            <span class="mstar">⭐</span>
            <span class="memoji">${m.emoji}</span>
            <span class="mname" style="color:${m.color}">${tx(m.name)}</span>
          </div>`).join("")}
      </div>
    </div>`;
}

function renderKidsPlay(){
  const m=MISSIONS[kids.mi];
  let body="";
  // feedback overlay (except trust adults uses its own)
  if(kids.feedback && !(m.type==="trust" && kids.step===1)){
    const msg = kids.feedback.msg || (kids.feedback.ok?tx(m.ok):tx(m.bad));
    const btn = kids.feedback.ok
      ? `<button class="bigbtn fbtn" onclick="kidsNext()">${tx(KUI.next)} ${arrow}</button>`
      : `<button class="bigbtn fbtn" onclick="kidsRetry()">${tx(KUI.tryagain)}</button>`;
    body = `${fufu(msg)}<div style="text-align:center">${btn}</div>`;
    return kidsShell(m, body);
  }

  if(m.type==="popups"){
    const p=m.popups[kids.step];
    body = `
      <div class="tablet">
        <div class="popup">
          <button class="x" onclick="kidsResult(true)">✕</button>
          <div class="pe">${p.emoji}</div>
          <div class="pt">${tx(p.t)}</div>
          <button class="bigbtn claim" onclick="kidsResult(false)">${tx(m.claim)}</button>
        </div>
      </div>`;
  }
  else if(m.type==="sort"){
    const it=m.items[kids.step];
    body = `
      <div class="item"><span class="ie">${it.emoji}</span>${tx(it.t)}</div>
      <div class="twobox">
        <button class="box share" onclick="kidsResult(${!it.secret})"><span class="be">🟢</span>${tx(m.share)}</button>
        <button class="box secret" onclick="kidsResult(${it.secret})"><span class="be">🔒</span>${tx(m.secret)}</button>
      </div>`;
  }
  else if(m.type==="choose"){
    const s=m.scenarios[kids.step];
    const flip=kids.step%2===1;
    const goodBtn=`<button class="choice" onclick="kidsResult(true)"><span class="ce">${s.good.e}</span>${tx(s.good.t)}</button>`;
    const badBtn=`<button class="choice" onclick="kidsResult(false)"><span class="ce">${s.bad.e}</span>${tx(s.bad.t)}</button>`;
    body = `
      <div class="qtext">${s.emoji} ${tx(s.q)}</div>
      <div class="choices">${flip?badBtn+goodBtn:goodBtn+badBtn}</div>`;
  }
  else if(m.type==="trust"){
    if(kids.step===0){
      const goodBtn=`<button class="choice" onclick="kidsResult(true)"><span class="ce">${m.good.e}</span>${tx(m.good.t)}</button>`;
      const badBtn=`<button class="choice" onclick="kidsResult(false)"><span class="ce">${m.badc.e}</span>${tx(m.badc.t)}</button>`;
      body = `<div class="qtext">💬 ${tx(m.q1)}</div><div class="choices">${goodBtn+badBtn}</div>`;
    } else {
      const all=Object.keys(kids.picked).length>=m.adults.length;
      body = `
        <div class="qtext">${tx(m.q2)}</div>
        <div class="people">
          ${m.adults.map((a,i)=>`<button class="person ${kids.picked[i]?'picked':''}" onclick="kidsPick(${i})"><span class="pe2">${a.e}</span>${tx(a.t)}</button>`).join("")}
        </div>
        ${all?`${fufu(tx(m.done2))}<div style="text-align:center"><button class="bigbtn fbtn" onclick="kidsNext()">${tx(KUI.next)} ${arrow}</button></div>`:""}`;
    }
  }
  return kidsShell(m, body);
}

function kidsShell(m, body){
  const total=stepsOf(m);
  const dots=Array.from({length:total},(_,i)=>`<span style="width:10px;height:10px;border-radius:50%;display:inline-block;margin:0 3px;background:${i<=kids.step?m.color:'#d7ddf5'}"></span>`).join("");
  app.innerHTML = `
    <div class="kids">
      <button class="back" onclick="kids.screen='map';render()">← ${tx(KUI.tomap)}</button>
      <h2 style="color:${m.color};font-size:1.5rem">${m.emoji} ${tx(m.name)}</h2>
      <div style="margin:10px 0 18px">${dots}</div>
      <div class="playcard">${body}</div>
    </div>`;
}

function renderKidsFinish(){
  app.innerHTML = `
    <div class="kids">
      <button class="back" onclick="kids.screen='map';render()">← ${tx(KUI.tomap)}</button>
      ${fufu(tx(KUI.finishHi))}
      <div class="cert">
        <div class="medal">🏅🦸🐶</div>
        <h3>${tx(KUI.certTitle)}</h3>
        <small>${tx(KUI.certName)}</small>
        <div class="line"></div>
        <p style="margin:12px 0;font-weight:700">${tx(KUI.certBody)}</p>
        <div style="font-size:1.8rem">⭐⭐⭐⭐</div>
      </div>
      <div style="margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="bigbtn fbtn" onclick="window.print()">${tx(KUI.print)}</button>
        <button class="bigbtn fbtn" style="background:#5b8cff" onclick="goTier('kids')">${tx(KUI.replay)}</button>
      </div>
    </div>`;
}

/* ---------------- CYBER CADETS APP ---------------- */
function coach(msg){
  return `<div class="fufu"><div class="fufu-av coach-av">🤖</div><div class="fufu-say">${msg}</div></div>`;
}
function cadetSteps(m){
  if(m.type==="pick")return m.questions.length;
  if(m.type==="sort2")return m.posts.length;
  if(m.type==="msg")return m.msgs.length;
  if(m.type==="toggle")return 1;
  return 1;
}
function cadetStart(i){ cadets.mi=i; cadets.step=0; cadets.feedback=null; cadets.toggles={}; cadets.screen="play"; render(); window.scrollTo({top:0}); }
function cadetResult(ok){ if(ok)cadets.points+=10; cadets.feedback={ok}; render(); }
function cadetRetry(){ cadets.feedback=null; render(); }
function cadetToggle(i,oi){ cadets.toggles[i]=oi; render(); }
function cadetSaveToggle(){ const m=CADETS[cadets.mi]; cadets.points+=10; cadets.feedback={ok:true,msg:tx(m.okDone)}; render(); }
function cadetNext(){
  cadets.feedback=null;
  const m=CADETS[cadets.mi];
  cadets.step++;
  if(cadets.step>=cadetSteps(m)){
    cadets.done[cadets.mi]=1; cadets.toggles={};
    if(Object.keys(cadets.done).length>=CADETS.length){ cadets.screen="finish"; }
    else { cadets.screen="map"; }
  }
  render(); window.scrollTo({top:0});
}

function renderCadets(){
  if(cadets.screen==="finish") return renderCadetFinish();
  if(cadets.screen==="play") return renderCadetPlay();
  const done=Object.keys(cadets.done).length;
  app.innerHTML = `
    <div class="kids">
      <button class="back" onclick="home()">← ${T.back[lang]}</button>
      <h2 style="color:#7ea6ff">🎮 ${tx(CUI.title)}</h2>
      ${coach(tx(CUI.hi))}
      <div class="pts">⚡ ${tx(CUI.pts)}: ${cadets.points} · ✅ ${done}/${CADETS.length}</div>
      <div class="mstops">
        ${CADETS.map((m,i)=>`
          <div class="mstop ${cadets.done[i]?'done':''}" onclick="cadetStart(${i})">
            <span class="mstar">⭐</span>
            <span class="memoji">${m.emoji}</span>
            <span class="mname" style="color:${m.color}">${tx(m.name)}</span>
          </div>`).join("")}
      </div>
    </div>`;
}

function renderCadetPlay(){
  const m=CADETS[cadets.mi];
  let body="";
  if(cadets.feedback){
    let msg=cadets.feedback.msg;
    if(!msg){
      if(m.type==="pick"){ const q=m.questions[cadets.step]; msg=cadets.feedback.ok?tx(q.ok):tx(q.bad); }
      else { msg=cadets.feedback.ok?tx(m.ok):tx(m.bad); }
    }
    const btn = cadets.feedback.ok
      ? `<button class="bigbtn fbtn" onclick="cadetNext()">${tx(CUI.next)} ${arrow}</button>`
      : `<button class="bigbtn fbtn" onclick="cadetRetry()">${tx(CUI.tryagain)}</button>`;
    return cadetShell(m, `${coach(msg)}<div style="text-align:center">${btn}</div>`);
  }

  if(m.type==="pick"){
    const q=m.questions[cadets.step];
    body = `<div class="qtext">${q.emoji?q.emoji+" ":""}${tx(q.q)}</div>
      <div class="optlist">
        ${q.options.map(o=>`<button class="optbtn" onclick="cadetResult(${o.correct})">${tx(o.t)}</button>`).join("")}
      </div>`;
  }
  else if(m.type==="sort2"){
    const p=m.posts[cadets.step];
    body = `<div class="msgcard"><div class="mbody">${tx(p.t)}</div></div>
      <div class="twobox">
        <button class="box safe" onclick="cadetResult(${!p.bad})"><span class="be">✅</span>${tx(m.safeLabel)}</button>
        <button class="box danger" onclick="cadetResult(${p.bad})"><span class="be">⚠️</span>${tx(m.badLabel)}</button>
      </div>`;
  }
  else if(m.type==="msg"){
    const ms=m.msgs[cadets.step];
    body = `<div class="msgcard"><div class="mfrom">${tx(ms.from)}</div><div class="mbody">${tx(ms.body)}</div></div>
      <div class="twobox">
        <button class="box safe" onclick="cadetResult(${!ms.scam})"><span class="be">✅</span>${tx(m.realLabel)}</button>
        <button class="box danger" onclick="cadetResult(${ms.scam})"><span class="be">🚨</span>${tx(m.scamLabel)}</button>
      </div>`;
  }
  else if(m.type==="toggle"){
    const allSafe=m.settings.every((s,i)=>cadets.toggles[i]===s.safe);
    body = `<div style="color:var(--muted);font-weight:600;margin-bottom:14px">${tx(m.intro)}</div>
      ${m.settings.map((s,i)=>{
        const sel=cadets.toggles[i];
        return `<div class="setrow"><div class="setlabel">${tx(s.label)}</div><div class="seg">
          ${s.options.map((o,oi)=>{
            let cls="segbtn";
            if(sel===oi) cls += oi===s.safe ? " good" : " bad";
            return `<button class="${cls}" onclick="cadetToggle(${i},${oi})">${tx(o)}</button>`;
          }).join("")}
        </div></div>`;
      }).join("")}
      <div style="text-align:center;margin-top:20px">
        <button class="bigbtn fbtn" ${allSafe?"":'disabled style="opacity:.4;cursor:not-allowed"'} onclick="cadetSaveToggle()">${tx(m.done)}</button>
      </div>`;
  }
  return cadetShell(m, body);
}

function cadetShell(m, body){
  const total=cadetSteps(m);
  const dots=Array.from({length:total},(_,i)=>`<span style="width:10px;height:10px;border-radius:50%;display:inline-block;margin:0 3px;background:${i<=cadets.step?m.color:'#d7ddf5'}"></span>`).join("");
  app.innerHTML = `
    <div class="kids">
      <button class="back" onclick="cadets.screen='map';render()">← ${tx(CUI.tomap)}</button>
      <h2 style="color:${m.color};font-size:1.5rem">${m.emoji} ${tx(m.name)}</h2>
      <div style="margin:10px 0 18px">${total>1?dots:""}</div>
      <div class="playcard">${body}</div>
    </div>`;
}

function renderCadetFinish(){
  app.innerHTML = `
    <div class="kids">
      <button class="back" onclick="cadets.screen='map';render()">← ${tx(CUI.tomap)}</button>
      ${coach(tx(CUI.finishHi))}
      <div class="cert" style="border-color:#7ea6ff">
        <div class="medal">🎖️</div>
        <h3 style="color:#5b8cff">${tx(CUI.badgeTitle)}</h3>
        <div style="font-size:1.3rem;font-weight:800;margin:10px 0;color:var(--ink)">${tx(CUI.scored)}: ${cadets.points} ⚡</div>
        <div style="font-size:1.8rem">🛡️🛡️🛡️🛡️🛡️</div>
      </div>
      <div style="margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="bigbtn fbtn" style="background:#5b8cff" onclick="goTier('cadets')">${tx(CUI.replay)}</button>
      </div>
    </div>`;
}

syncLangButtons();
render();
</script>
</body>
